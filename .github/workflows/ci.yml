name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - run: pnpm install --no-frozen-lockfile --config.auto-install-peers=false

      - name: Typecheck
        run: pnpm typecheck || true

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test --if-present || true

      - name: Lint
        run: pnpm exec eslint --no-warn-ignored --max-warnings 0 src/

